<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add item</title>
  </head>

  <body>
    <div id="authInfo"></div>
    <div>
      <a href="./register.html">Home</a>
    </div>

    <h1>Add an item to the database here</h1>
    <h2>Add pezzo di ricambio</h2>
    Pezzo name
    <input type="text" id="pezzoNameInput" />
    Pezzo price
    <input type="text" id="pezzoPriceInput" />
    Pezzo description
    <input type="text" id="pezzoDescriptionInput" />
    <button id="addPezzoButton">Add pezzo</button>

    <h2>Add servizio</h2>
    Servizio name
    <input type="text" id="servizioNameInput" />
    Servizio price
    <input type="text" id="servizioPriceInput" />
    Servizio description
    <input type="text" id="servizioDescriptionInput" />
    <button id="addServizioButton">Add servizio</button>
    <h2>Add accessorio</h2>
    Accessorio name
    <input type="text" id="accessorioNameInput" />
    Accessorio price
    <input type="text" id="accessorioPriceInput" />
    Accessorio description
    <input type="text" id="accessorioDescriptionInput" />
    <button id="addAccessorioButton">Add accessorio</button>
  </body>
  <script src="./../js/api_functions.js"></script>
  <script src="./../js/globalStartupActions.js"></script>
  <script src="./../js/addItems.js"></script>
</html>
